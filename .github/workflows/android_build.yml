name: Build Android APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build App
        run: |
          # Create web directory if missing
          mkdir -p www
          
          # Initialize Android if the folder wasn't pushed from Termux
          npx cap add android || echo "Android folder already exists"
          
          # Sync configuration (this updates the app name/URL)
          npx cap sync
          
          # Enter the android directory and build the APK
          cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AnimeKai-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
